name: Build VCAMLight

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: theos/theos-action@v2
        with:
          theos-sdks-source: https://github.com/theos/sdks
          cache-theos: true

      - name: Build package
        run: make package THEOS_PACKAGE_SCHEME=rootless

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: VCAMLight-deb
          path: packages/*.deb
          if-no-files-found: error
