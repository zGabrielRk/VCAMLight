name: Build VCAMLight

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Theos
        id: theos-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: theos-macOS14-v4

      - name: Install Theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Setup Xcode SDK for Theos
        run: |
          # Find the SDK that ships with the runner's Xcode (always compatible)
          XCODE_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          SDK_VERSION=$(xcrun --sdk iphoneos --show-sdk-version)
          echo "Using Xcode SDK: $XCODE_SDK (version $SDK_VERSION)"

          # Create sdks dir and symlink the Xcode SDK into theos
          mkdir -p $THEOS/sdks
          ln -sfn "$XCODE_SDK" "$THEOS/sdks/iPhoneOS${SDK_VERSION}.sdk"
          ls -la $THEOS/sdks/

      - name: Install ldid
        run: brew install ldid

      - name: Build package
        run: |
          # Detect SDK version and pass it to make
          SDK_VERSION=$(xcrun --sdk iphoneos --show-sdk-version)
          make package THEOS_PACKAGE_SCHEME=rootless TARGET="iphone:clang:${SDK_VERSION}:14.0"

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: VCAMLight-deb
          path: packages/*.deb
          if-no-files-found: error
